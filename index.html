<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
    <title>小七导航 · 手机完美版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 12px;
            min-height: 100vh;
        }

        /* 主容器 - 手机单列 */
        .app {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* 卡片通用样式 */
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef2f6;
        }

        /* 顶部区域 */
        .header {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #1f5e6e, #2c8d9e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        
        /* 搜索条 */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: #f8fafc;
        }
        .search-box button {
            background: #2c8d9e;
            border: none;
            color: white;
            padding: 0 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        /* 用户状态栏 */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 40px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
        }
        .login-btn {
            background: #2c8d9e;
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .logout-btn {
            background: #e2e8f0;
            border: none;
            color: #475569;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }

        /* 下班倒计时 */
        .countdown-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .countdown-label {
            background: #eef2fa;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }
        #offworkDisplay {
            font-size: 16px;
            font-weight: 600;
            color: #2c6e7e;
        }
        .time-select {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .time-select input {
            border: none;
            background: transparent;
            font-size: 14px;
            width: 70px;
            outline: none;
        }

        /* 区块标题 */
        .section-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 14px;
            padding-left: 8px;
            border-left: 4px solid #2c8d9e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .add-btn {
            background: #eef2fa;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 链接列表 - 大触摸区域 */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #fafcff;
            border-radius: 16px;
            margin-bottom: 8px;
            border: 1px solid #edf2f7;
            transition: 0.1s;
        }
        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }
        .link-icon {
            font-size: 24px;
            width: 36px;
            text-align: center;
        }
        .link-info {
            flex: 1;
        }
        .link-name {
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
        }
        .click-badge {
            font-size: 11px;
            background: #eef2fa;
            padding: 3px 10px;
            border-radius: 20px;
            color: #4a627a;
            margin-top: 4px;
            display: inline-block;
        }
        .link-actions {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            color: #94a3b8;
        }
        .icon-btn:active {
            opacity: 0.6;
        }

        /* 添加链接区域 */
        .add-link-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .add-link-row input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            background: #f8fafc;
        }
        .small-btn {
            background: #eef2fa;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .primary-btn {
            background: #2c8d9e;
            color: white;
        }

        /* 自开发按钮组 */
        .tools-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tool-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 70px;
            text-align: center;
        }
        .tool-btn:active {
            background: #e2e8f0;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            width: 85%;
            max-width: 340px;
            border-radius: 32px;
            padding: 24px 20px;
            text-align: center;
        }
        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            margin: 12px 0;
            outline: none;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .modal-btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-btn-confirm {
            background: #2c8d9e;
            color: white;
        }
        .modal-btn-cancel {
            background: #eef2fa;
            color: #475569;
        }
        .close-x {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 8px;
        }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 16px;
            padding: 12px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 头部 -->
    <div class="header">
        <div class="logo">🍃 小七导航 · 云端同步</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索链接名称...">
            <button id="searchBtn">搜索</button>
        </div>
        <div class="user-bar">
            <span class="user-name" id="userNameDisplay">👋 未登录</span>
            <button id="authActionBtn" class="login-btn">登录 / 注册</button>
        </div>
    </div>

    <!-- 下班倒计时卡片 -->
    <div class="card">
        <div class="countdown-row">
            <span class="countdown-label">⏰ 下班倒计时</span>
            <span id="offworkDisplay">--:--:--</span>
            <div class="time-select">
                <input type="time" id="offworkTime" value="18:00">
                <button id="setTimeBtn" class="small-btn">设定</button>
            </div>
        </div>
    </div>

    <!-- 常用办公套件 -->
    <div class="card">
        <div class="section-title">
            <span>📌 常用办公套件</span>
        </div>
        <div id="defaultLinksContainer"></div>
    </div>

    <!-- 我的自定义导航 -->
    <div class="card">
        <div class="section-title">
            <span>⭐ 我的自定义导航</span>
            <button id="addCustomBtn" class="add-btn">➕ 添加</button>
        </div>
        <div id="customLinksContainer"></div>
        <div class="add-link-row">
            <input type="text" id="newLinkName" placeholder="名称">
            <input type="text" id="newLinkUrl" placeholder="网址 https://">
            <button id="quickAddBtn" class="small-btn primary-btn">快速添加</button>
        </div>
        <div style="font-size: 11px; color: #94a3b8; margin-top: 8px;">✨ 登录后云端保存 | 点击自动计数</div>
    </div>

    <!-- 自开发工具箱 -->
    <div class="card">
        <div class="section-title">⚙️ 自开发</div>
        <div class="tools-grid">
            <button class="tool-btn" id="jizhangBtn">💰 小七记账</button>
            <button class="tool-btn" id="bijianBtn">📝 小七便签</button>
            <button class="tool-btn" id="saiboBtn">💻 赛博打工人</button>
            <button class="tool-btn" id="yangBtn">🐏 羊了个羊</button>
            <button class="tool-btn" id="randomPwdBtn">🔐 随机密码</button>
            <button class="tool-btn" id="copyUrlBtn">📋 复制地址</button>
            <button class="tool-btn" id="friendLinkBtn">🔗 友链申请</button>
        </div>
    </div>

    <div class="footer">
        💡 云端驱动 | 昵称+密码登录 (英文数字) | 触摸优化
    </div>
</div>

<!-- 登录弹窗 -->
<div id="loginModal" class="modal">
    <div class="modal-box">
        <span class="close-x" id="closeLoginModal">&times;</span>
        <div id="loginForm">
            <h3>登录小七导航</h3>
            <input type="text" id="loginNick" placeholder="昵称 (英文+数字)" autocomplete="off">
            <input type="password" id="loginPwd" placeholder="密码 (英文+数字)">
            <button id="doLoginBtn" class="modal-btn modal-btn-confirm" style="width:100%;">登录</button>
            <div style="margin-top: 12px;">
                <span id="switchToReg" style="color:#2c8d9e; font-size:13px; cursor:pointer;">没有账号？立即注册</span>
            </div>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="regForm" style="display:none;">
            <h3>注册账号</h3>
            <input type="text" id="regNick" placeholder="昵称 (英文+数字, 2-20位)" autocomplete="off">
            <input type="password" id="regPwd" placeholder="密码 (英文+数字, 4-20位)">
            <input type="password" id="regConfirmPwd" placeholder="确认密码">
            <button id="doRegBtn" class="modal-btn modal-btn-confirm" style="width:100%;">注册并登录</button>
            <div style="margin-top: 12px;">
                <span id="switchToLogin" style="color:#2c8d9e; font-size:13px; cursor:pointer;">← 返回登录</span>
            </div>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>
</div>

<!-- 友链申请弹窗 -->
<div id="friendModal" class="modal">
    <div class="modal-box">
        <span class="close-x" id="closeFriendModal">&times;</span>
        <h3>🔗 友链申请</h3>
        <p style="font-size:13px; color:#6c819e;">请输入您的网站地址</p>
        <input type="url" id="friendUrl" placeholder="https://你的网站.com">
        <div class="modal-buttons">
            <button id="submitFriendBtn" class="modal-btn modal-btn-confirm">提交</button>
            <button id="cancelFriendBtn" class="modal-btn modal-btn-cancel">取消</button>
        </div>
        <div id="friendMsg" class="error-msg" style="color:#2c8d9e;"></div>
    </div>
</div>

<script type="module">
    // Supabase 配置
    const SUPABASE_URL = 'https://ogldsgcwldzrjqbvqbft.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbGRzZ2N3bGR6cmpxYnZxYmZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTA4ODUsImV4cCI6MjA5MjIyNjg4NX0.8UiI78s-j7J4dXetBmDWs3u59rAp5ZJqLbk2J66xGyo';
    
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // 当前用户
    let currentUser = null;
    let customLinks = [];
    
    // 工具函数
    function hashPwd(pwd) { return btoa(unescape(encodeURIComponent(pwd + "xiaoqi_salt"))); }
    function isValidNick(n) { return /^[A-Za-z0-9]{2,20}$/.test(n); }
    function isValidPwd(p) { return /^[A-Za-z0-9]{4,20}$/.test(p); }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // 加载用户自定义链接
    async function loadCustomLinks() {
        if (!currentUser) return [];
        const { data, error } = await supabase.from('user_links').select('*').eq('username', currentUser).order('id');
        if (error) return [];
        return data.map(item => ({ id: item.id, name: item.link_name, url: item.link_url, icon: item.link_icon || '🔗', clicks: item.click_count || 0 }));
    }
    
    // 添加链接
    async function addLink(name, url, icon = '🔗') {
        if (!currentUser) { alert("请先登录"); return false; }
        if (!url.startsWith('http')) url = 'https://' + url;
        const { error } = await supabase.from('user_links').insert({ username: currentUser, link_name: name, link_url: url, link_icon: icon, click_count: 0 });
        if (error) { alert("添加失败"); return false; }
        await refreshCustomLinks();
        return true;
    }
    
    // 更新链接
    async function updateLink(id, name, url, icon, clicks) {
        await supabase.from('user_links').update({ link_name: name, link_url: url, link_icon: icon, click_count: clicks }).eq('id', id).eq('username', currentUser);
        await refreshCustomLinks();
    }
    
    // 删除链接
    async function deleteLink(id) {
        await supabase.from('user_links').delete().eq('id', id).eq('username', currentUser);
        await refreshCustomLinks();
    }
    
    // 增加点击
    async function incrementClick(id, currentClicks) {
        await supabase.from('user_links').update({ click_count: currentClicks + 1 }).eq('id', id).eq('username', currentUser);
        await refreshCustomLinks();
    }
    
    async function refreshCustomLinks() {
        customLinks = await loadCustomLinks();
        renderCustomLinks();
    }
    
    // 渲染自定义链接
    function renderCustomLinks() {
        const container = document.getElementById('customLinksContainer');
        if (!container) return;
        if (!currentUser) {
            container.innerHTML = '<div style="padding:16px; text-align:center; color:#94a3b8;">🔐 登录后即可保存自定义链接</div>';
            return;
        }
        if (customLinks.length === 0) {
            container.innerHTML = '<div style="padding:16px; text-align:center; color:#94a3b8;">✨ 暂无链接，点击上方添加</div>';
            return;
        }
        container.innerHTML = '';
        customLinks.forEach(link => {
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <div class="link-left" data-id="${link.id}" data-url="${escapeHtml(link.url)}">
                    <div class="link-icon">${link.icon}</div>
                    <div class="link-info">
                        <div class="link-name">${escapeHtml(link.name)}</div>
                        <span class="click-badge">📊 ${link.clicks} 次</span>
                    </div>
                </div>
                <div class="link-actions">
                    <button class="icon-btn edit-link" data-id="${link.id}" data-name="${escapeHtml(link.name)}" data-url="${escapeHtml(link.url)}" data-icon="${link.icon}">✏️</button>
                    <button class="icon-btn delete-link" data-id="${link.id}">🗑️</button>
                </div>
            `;
            // 点击打开链接
            div.querySelector('.link-left').addEventListener('click', async (e) => {
                if (e.target.closest('.icon-btn')) return;
                await incrementClick(link.id, link.clicks);
                window.open(link.url, '_blank');
            });
            container.appendChild(div);
        });
        // 编辑
        document.querySelectorAll('.edit-link').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const oldName = btn.dataset.name;
                const oldUrl = btn.dataset.url;
                const newName = prompt("编辑名称", oldName);
                if (!newName) return;
                let newUrl = prompt("编辑网址", oldUrl);
                if (!newUrl) return;
                if (!newUrl.startsWith('http')) newUrl = 'https://' + newUrl;
                const newIcon = prompt("图标(emoji)", btn.dataset.icon || "🔗");
                await updateLink(id, newName.trim(), newUrl, newIcon || "🔗", customLinks.find(l => l.id === id)?.clicks || 0);
            });
        });
        // 删除
        document.querySelectorAll('.delete-link').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (confirm("删除此链接？")) {
                    await deleteLink(parseInt(btn.dataset.id));
                }
            });
        });
        // 高亮搜索
        applySearchHighlight();
    }
    
    // 常用办公套件 (固定)
    const defaultSites = [
        { name: "小七便签", url: "https://yanqi-spec.github.io/-/", icon: "📝" },
        { name: "秘塔搜索AI", url: "https://metaso.cn/", icon: "🤖" },
        { name: "在线PS", url: "https://ps.gaoding.com/#/", icon: "🎨" },
        { name: "Word转长图", url: "https://xpdf.cn/word-to-long-image", icon: "🖼️" },
        { name: "小说txt下载", url: "http://aiqu126.com/", icon: "📚" },
        { name: "表情包搜索", url: "https://emojis.click/zh", icon: "😆" },
        { name: "无水印解析", url: "https://pv.vlogdownloader.com/", icon: "⬇️" }
    ];
    const defaultClicksKey = "default_clicks";
    function getDefaultClicks() { const s = localStorage.getItem(defaultClicksKey); return s ? JSON.parse(s) : {}; }
    function saveDefaultClicks(map) { localStorage.setItem(defaultClicksKey, JSON.stringify(map)); }
    function incrementDefaultClick(url) { const map = getDefaultClicks(); map[url] = (map[url] || 0) + 1; saveDefaultClicks(map); renderDefaultLinks(); }
    function renderDefaultLinks() {
        const container = document.getElementById('defaultLinksContainer');
        if (!container) return;
        container.innerHTML = '';
        defaultSites.forEach(site => {
            const clicks = getDefaultClicks()[site.url] || 0;
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <div class="link-left" data-url="${escapeHtml(site.url)}">
                    <div class="link-icon">${site.icon}</div>
                    <div class="link-info">
                        <div class="link-name">${escapeHtml(site.name)}</div>
                        <span class="click-badge">点击 ${clicks}</span>
                    </div>
                </div>
            `;
            div.querySelector('.link-left').addEventListener('click', (e) => {
                incrementDefaultClick(site.url);
                window.open(site.url, '_blank');
            });
            container.appendChild(div);
        });
        applySearchHighlight();
    }
    
    // 搜索高亮
    let currentKeyword = '';
    function applySearchHighlight() {
        if (!currentKeyword) return;
        const regex = new RegExp(`(${currentKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        document.querySelectorAll('.link-name').forEach(el => {
            const original = el.innerText;
            if (regex.test(original)) {
                el.innerHTML = original.replace(regex, `<span style="background:#ffeb9e; color:#c45b00; border-radius:4px; padding:0 2px;">$1</span>`);
            } else {
                el.innerHTML = original;
            }
        });
    }
    function clearHighlight() {
        document.querySelectorAll('.link-name').forEach(el => { el.innerHTML = el.innerText; });
    }
    function searchLinks() {
        const kw = document.getElementById('searchInput').value.trim();
        currentKeyword = kw;
        if (!kw) {
            clearHighlight();
            return;
        }
        clearHighlight();
        applySearchHighlight();
    }
    
    // 下班倒计时
    let offHour = 18, offMin = 0;
    function updateCountdown() {
        const now = new Date();
        const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), offHour, offMin, 0);
        const el = document.getElementById('offworkDisplay');
        if (now >= target) {
            el.innerText = '🎉 已下班！';
        } else {
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            el.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
    }
    function setOffwork() {
        const val = document.getElementById('offworkTime').value;
        const [h, m] = val.split(':').map(Number);
        offHour = h; offMin = m;
        updateCountdown();
        alert(`下班时间设为 ${h}:${m}`);
    }
    
    // 用户认证 (profiles 表)
    async function signUp(nick, pwd) {
        if (!isValidNick(nick)) return { ok: false, msg: "昵称需为英文+数字，2-20位" };
        if (!isValidPwd(pwd)) return { ok: false, msg: "密码需为英文+数字，4-20位" };
        const { data: exist } = await supabase.from('profiles').select('nickname').eq('nickname', nick).maybeSingle();
        if (exist) return { ok: false, msg: "昵称已存在" };
        const { error } = await supabase.from('profiles').insert({ nickname: nick, password_hash: hashPwd(pwd) });
        if (error) return { ok: false, msg: "注册失败，请确保已创建 profiles 表" };
        return { ok: true };
    }
    async function signIn(nick, pwd) {
        const { data, error } = await supabase.from('profiles').select('nickname, password_hash').eq('nickname', nick).maybeSingle();
        if (error || !data) return { ok: false, msg: "用户不存在" };
        if (data.password_hash !== hashPwd(pwd)) return { ok: false, msg: "密码错误" };
        return { ok: true };
    }
    function updateUserUI() {
        const nameSpan = document.getElementById('userNameDisplay');
        const btn = document.getElementById('authActionBtn');
        if (currentUser) {
            nameSpan.innerHTML = `👤 ${currentUser}`;
            btn.innerHTML = '退出登录';
            btn.className = 'logout-btn';
        } else {
            nameSpan.innerHTML = '👋 未登录';
            btn.innerHTML = '登录 / 注册';
            btn.className = 'login-btn';
        }
    }
    
    // 登录登出
    async function doLogin(nick, pwd) {
        const res = await signIn(nick, pwd);
        if (res.ok) {
            currentUser = nick;
            localStorage.setItem('xiaoqi_user', nick);
            updateUserUI();
            closeLoginModal();
            await refreshCustomLinks();
        } else {
            document.getElementById('loginError').innerText = res.msg;
        }
    }
    async function doReg(nick, pwd, confirm) {
        if (pwd !== confirm) { document.getElementById('regError').innerText = "两次密码不一致"; return; }
        const res = await signUp(nick, pwd);
        if (res.ok) {
            alert("注册成功！请登录");
            switchToLogin();
        } else {
            document.getElementById('regError').innerText = res.msg;
        }
    }
    function logout() {
        currentUser = null;
        localStorage.removeItem('xiaoqi_user');
        customLinks = [];
        updateUserUI();
        renderCustomLinks();
    }
    async function initSession() {
        const saved = localStorage.getItem('xiaoqi_user');
        if (saved) {
            const { data } = await supabase.from('profiles').select('nickname').eq('nickname', saved).maybeSingle();
            if (data) {
                currentUser = saved;
                customLinks = await loadCustomLinks();
            }
        }
        updateUserUI();
        renderCustomLinks();
    }
    
    // 弹窗控制
    const loginModal = document.getElementById('loginModal');
    const friendModal = document.getElementById('friendModal');
    function openLoginModal() { loginModal.style.display = 'flex'; }
    function closeLoginModal() { loginModal.style.display = 'none'; document.getElementById('loginError').innerText = ''; document.getElementById('regError').innerText = ''; }
    function openFriendModal() { friendModal.style.display = 'flex'; }
    function closeFriendModal() { friendModal.style.display = 'none'; document.getElementById('friendUrl').value = ''; document.getElementById('friendMsg').innerText = ''; }
    function switchToReg() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('regForm').style.display = 'block'; }
    function switchToLogin() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('regForm').style.display = 'none'; }
    
    // 事件绑定
    document.getElementById('authActionBtn').onclick = () => { if (currentUser) logout(); else openLoginModal(); };
    document.getElementById('closeLoginModal').onclick = closeLoginModal;
    document.getElementById('switchToReg').onclick = switchToReg;
    document.getElementById('switchToLogin').onclick = switchToLogin;
    document.getElementById('doLoginBtn').onclick = () => { const n = document.getElementById('loginNick').value.trim(); const p = document.getElementById('loginPwd').value; doLogin(n, p); };
    document.getElementById('doRegBtn').onclick = () => { const n = document.getElementById('regNick').value.trim(); const p = document.getElementById('regPwd').value; const c = document.getElementById('regConfirmPwd').value; doReg(n, p, c); };
    document.getElementById('addCustomBtn').onclick = () => { if(!currentUser){ alert("请先登录"); return; } let n = prompt("链接名称"); if(n){ let u = prompt("网址"); if(u) addLink(n, u); } };
    document.getElementById('quickAddBtn').onclick = () => { if(!currentUser){ alert("请先登录"); return; } let n = document.getElementById('newLinkName').value.trim(); let u = document.getElementById('newLinkUrl').value.trim(); if(n && u) { addLink(n, u); document.getElementById('newLinkName').value = ''; document.getElementById('newLinkUrl').value = ''; } else alert("填写完整"); };
    document.getElementById('searchBtn').onclick = searchLinks;
    document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchLinks(); });
    document.getElementById('setTimeBtn').onclick = setOffwork;
    // 自开发按钮
    document.getElementById('jizhangBtn').onclick = () => window.open('https://yanqi-spec.github.io/jizhang/', '_blank');
    document.getElementById('bijianBtn').onclick = () => window.open('https://yanqi-spec.github.io/-/', '_blank');
    document.getElementById('saiboBtn').onclick = () => window.open('https://yanqi-spec.github.io/myns/', '_blank');
    document.getElementById('yangBtn').onclick = () => window.open('https://yanqi-spec.github.io/yanglegeyang/', '_blank');
    document.getElementById('randomPwdBtn').onclick = () => { let pwd = Math.random().toString(36).slice(-10); navigator.clipboard.writeText(pwd); alert(`密码: ${pwd}`); };
    document.getElementById('copyUrlBtn').onclick = () => { navigator.clipboard.writeText(window.location.href); alert("已复制地址"); };
    document.getElementById('friendLinkBtn').onclick = openFriendModal;
    document.getElementById('closeFriendModal').onclick = closeFriendModal;
    document.getElementById('cancelFriendBtn').onclick = closeFriendModal;
    document.getElementById('submitFriendBtn').onclick = () => { const url = document.getElementById('friendUrl').value.trim(); if(!url) { document.getElementById('friendMsg').innerText = "请输入网址"; return; } if(!url.startsWith('http')) { document.getElementById('friendMsg').innerText = "请以 http:// 或 https:// 开头"; return; } document.getElementById('friendMsg').innerHTML = "✅ 申请已提交！"; setTimeout(() => closeFriendModal(), 1500); };
    window.onclick = (e) => { if(e.target === loginModal) closeLoginModal(); if(e.target === friendModal) closeFriendModal(); };
    
    // 启动
    renderDefaultLinks();
    updateCountdown();
    setInterval(updateCountdown, 1000);
    initSession();
</script>
</body>
</html>
